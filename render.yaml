# Render Blueprint — deploy Envault API + Vault
# https://render.com/docs/blueprint-spec
services:
  # Go API Server
  - type: web
    name: envault-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: SERVER_PORT
        value: "8080"
      - key: SERVER_HOST
        value: "0.0.0.0"
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_PORT
        value: "5432"
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: DATABASE_NAME
        value: postgres
      - key: DATABASE_SSLMODE
        value: require
      - key: VAULT_ADDR
        sync: false
      - key: VAULT_TOKEN
        sync: false
      - key: VAULT_MOUNT_PREFIX
        value: envault
      - key: JWKS_URL
        sync: false
      - key: JWT_ISSUER
        sync: false
      - key: JWT_AUDIENCE
        value: ""
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: RATE_LIMIT_AUTH
        value: "10"
      - key: RATE_LIMIT_WRITE
        value: "30"
      - key: RATE_LIMIT_READ
        value: "100"
