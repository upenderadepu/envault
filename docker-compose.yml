services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER:-envault}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-envault_dev_password}
      POSTGRES_DB: ${DATABASE_NAME:-envault}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-envault} -d ${DATABASE_NAME:-envault}"]
      interval: 5s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.15
    ports:
      - "8200:8200"
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_TOKEN:-dev-root-token}"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 2>&1 | grep -E 'Sealed\\s+false' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  vault-init:
    image: hashicorp/vault:1.15
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_TOKEN:-dev-root-token}"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        vault secrets enable -path=envault kv-v2 2>/dev/null || true
        echo "Vault KV-v2 engine ready at envault/"
    restart: "no"

  envault-api:
    build: .
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SERVER_PORT: "8080"
      SERVER_HOST: "0.0.0.0"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: ${DATABASE_USER:-envault}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-envault_dev_password}
      DATABASE_NAME: ${DATABASE_NAME:-envault}
      DATABASE_SSLMODE: disable
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: ${VAULT_TOKEN:-dev-root-token}
      VAULT_MOUNT_PREFIX: envault
      JWKS_URL: ${JWKS_URL}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_AUTH: ${RATE_LIMIT_AUTH:-10}
      RATE_LIMIT_WRITE: ${RATE_LIMIT_WRITE:-30}
      RATE_LIMIT_READ: ${RATE_LIMIT_READ:-100}
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  envault-web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      envault-api:
        condition: service_healthy

volumes:
  pgdata:
