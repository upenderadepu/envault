<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" font-family="'SF Mono', Menlo, Monaco, Consolas, monospace" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f1115"/>
      <stop offset="100%" stop-color="#0a0c10"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Window -->
  <rect x="20" y="20" width="720" height="520" rx="12" fill="url(#bg)" stroke="#2a2f3a" stroke-width="1" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect x="20" y="20" width="720" height="36" rx="12" fill="#14171d"/>
  <rect x="20" y="44" width="720" height="12" fill="#14171d"/>
  <circle cx="42" cy="38" r="6" fill="#ff5f57"/>
  <circle cx="62" cy="38" r="6" fill="#febc2e"/>
  <circle cx="82" cy="38" r="6" fill="#28c840"/>
  <text x="380" y="42" fill="#6b7280" font-size="12" text-anchor="middle">envault — secure secrets for teams</text>

  <!-- Logo / banner -->
  <text x="40" y="88"  fill="#06b6d4" font-weight="700">  ╔═╗╔╗╔╦  ╦╔═╗╦ ╦╦ ╔╦╗</text>
  <text x="40" y="104" fill="#06b6d4" font-weight="700">  ║╣ ║║║╚╗╔╝╠═╣║ ║║  ║</text>
  <text x="40" y="120" fill="#06b6d4" font-weight="700">  ╚═╝╝╚╝ ╚╝ ╩ ╩╚═╝╩═╝╩</text>
  <text x="40" y="140" fill="#6b7280">  Secure secrets management for teams</text>

  <!-- Command 1: login -->
  <text x="40" y="174" fill="#22d3ee">$</text>
  <text x="58" y="174" fill="#e5e7eb">envault login</text>
  <text x="40" y="194" fill="#22d3ee">  ?</text>
  <text x="68" y="194" fill="#e5e7eb" font-weight="700">Email:</text>
  <text x="120" y="194" fill="#9ca3af">alice@company.com</text>
  <text x="40" y="212" fill="#10b981">  ✓</text>
  <text x="60" y="212" fill="#e5e7eb">Logged in</text>

  <!-- Command 2: projects create -->
  <text x="40" y="244" fill="#22d3ee">$</text>
  <text x="58" y="244" fill="#e5e7eb">envault projects create my-saas</text>
  <text x="40" y="262" fill="#10b981">  ✓</text>
  <text x="60" y="262" fill="#e5e7eb">Project created</text>
  <text x="40" y="280" fill="#6b7280">  Name: my-saas</text>
  <text x="40" y="296" fill="#6b7280">  Slug: my-saas</text>

  <!-- Command 3: secrets set -->
  <text x="40" y="328" fill="#22d3ee">$</text>
  <text x="58" y="328" fill="#e5e7eb">envault secrets set DATABASE_URL=postgres://... API_KEY=sk-live-abc</text>
  <text x="40" y="346" fill="#10b981">  ✓</text>
  <text x="60" y="346" fill="#e5e7eb">Set 2 secrets in development</text>

  <!-- Command 4: members add -->
  <text x="40" y="378" fill="#22d3ee">$</text>
  <text x="58" y="378" fill="#e5e7eb">envault members add bob@company.com --role developer</text>
  <text x="40" y="396" fill="#10b981">  ✓</text>
  <text x="60" y="396" fill="#e5e7eb">Member invited</text>
  <text x="40" y="414" fill="#fbbf24">  ⚠ Share this invite code with the member:</text>
  <text x="60" y="434" fill="#22d3ee" font-weight="700">A1B2C3D4</text>

  <!-- Command 5: run -->
  <text x="40" y="466" fill="#22d3ee">$</text>
  <text x="58" y="466" fill="#e5e7eb">envault run -- npm start</text>
  <text x="40" y="484" fill="#10b981">  ✓</text>
  <text x="60" y="484" fill="#e5e7eb">Loaded 12 secrets from development</text>
  <text x="40" y="502" fill="#6b7280">  Injecting: API_KEY, DATABASE_URL, JWT_SECRET, REDIS_URL, STRIPE_KEY...</text>

  <!-- Blinking cursor -->
  <text x="40" y="526" fill="#22d3ee">$</text>
  <rect x="58" y="516" width="8" height="14" fill="#22d3ee">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
